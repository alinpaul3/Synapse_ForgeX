<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Personality Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      width: 80%;
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #3d8b40;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .info {
      margin-top: 10px;
      font-size: 16px;
    }

    .confidence {
      font-size: 14px;
      color: #ccc;
      margin-top: 5px;
    }

    .explanation {
      font-size: 15px;
      margin-top: 10px;
      font-style: italic;
      color: #e0e0e0;
    }
  </style>
</head>

<body>

<h1>🧠 Personality Analyzer</h1>

<!-- 🔰 GET STARTED -->
<div id="get-started" class="container">
  <h2>Get Started</h2>
  <p>Install our Chrome Extension to analyze your personality</p>

  <button onclick="alert('Load extension from chrome://extensions')">
    Install Extension
  </button>

  <h3 style="margin-top:20px;">How it works</h3>
  <p>
    1. Install extension<br>
    2. Select platforms<br>
    3. Give consent<br>
    4. View personality insights
  </p>
</div>

<!-- 📊 RESULT -->
<div id="result-section" class="container" style="display:none;">
  <h2 id="user"></h2>
  <div class="confidence" id="confidence"></div>
  <div class="explanation" id="explanation"></div>
  <canvas id="chart"></canvas>
</div>

<script src="dashboard.js"></script>

</body>
</html>
